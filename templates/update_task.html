{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-warning text-dark p-4">

                    <h2 class="mb-0">
                        ✏️ Update Task
                    </h2>

                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Task Title

                            </label>

                            {{ form.title }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">

                                Description

                            </label>

                            {{ form.description }}

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Category

                                </label>

                                {{ form.category }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Priority

                                </label>

                                {{ form.priority }}

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Due Date

                                </label>

                                {{ form.due_date }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Due Time

                                </label>

                                {{ form.due_time }}

                            </div>

                        </div>

                        <div class="form-check mb-4">

                            {{ form.done }}

                            <label class="form-check-label">

                                Completed

                            </label>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{% url 'home' %}"
                               class="btn btn-secondary">

                                ← Cancel

                            </a>

                            <button
                                class="btn btn-warning">

                                💾 Save Changes

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
